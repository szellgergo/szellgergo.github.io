<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <link rel="stylesheet" href="css/content.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    <title>Document</title>
</head>
<body>
    <div class="container">

    <h1>Üzenj nekünk.</h1>
    <form action="">
        <fieldset >
            <legend>Személyes adatok</legend>
            <div>
                <label for="name">Név: *</label>
                <input type="text" name="name" id="name" required>
            </div>
            <div>
                <label for="email">Email cím: *</label>
                <input type="email" name="email" id="email" required>
            </div>           
        </fieldset>
        <fieldset>
            <legend>Üzenet</legend>
            <div>
                <label for="messege">Üzenet:</label>
                <textarea name="messege" id="messege" cols="30" rows="10"></textarea>
            </div>
        </fieldset>
        <fieldset>
            <div>
                <label for="mail">Érdekel mi történik veletek: </label>
                <input type="checkbox" name="mail" id="mail" value="monthmail">
                
            </div>
            <div>
                <button class="btn-primary" type="submit">Üzenet elküldése</button>
            </div>
        </fieldset>
        
    </form>
</div>
</body>
</html>
