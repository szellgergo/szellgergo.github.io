      <br>
    <div class="container">
    <h1>Üzenj nekünk</h1>
    <form action="http://my.ferid.hu/OnlineIdea/Contact/">
        <fieldset>
            <legend>Személyes adatok</legend>
            <div class="row">
                <div class="col-1 col-sm-0 col-md-2"></div>
                <label class="col-5 col-sm-4 col-md-3" for="name">Név: *</label>                
                <input class="col-5  col-sm-6 col-md-3" type="text" name="name" id="name" onfocusout="nameValidation()" required>
                <div class="col-12" id="nameMessegeBox"></div>
            </div>
            <br>
            <div class="row">
                <div class="col-1 col-sm-0 col-md-2"></div>
                <label class="col-5 col-sm-4 col-md-3" for="email">Email cím: *</label>
                <input class="col-5 col-sm-6 col-md-3" type="email" name="email" id="email" onfocusout="emailValidation()" required>
                <div class="col-12" id="emailMessegeBox"></div>
            </div>
            <br>           
        </fieldset>
        <fieldset>
            <legend>Üzenet</legend>
            <div class="row">
                <div class="col-1 col-sm-2 col-md-3"></div>
                <textarea class="col-10 col-sm-8 col-md-6" name="messege" id="messege" cols="50" rows="10"></textarea>
            </div>
        </fieldset>
        <br>
        <fieldset>
            <div>
                <label for="mail">Felíratkozok a havi hírlevélre: </label>
                <input type="checkbox" name="mail" id="mail" value="monthmail">               
            </div>
            <br>
            <div>
                <button class="btn btn-primary" type="submit">Üzenet elküldése</button>
            </div>
        </fieldset>        
    </form>
</div>
<script src="/js/contact.js"></script>
</body>
</html>
